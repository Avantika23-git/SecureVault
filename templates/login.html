<!DOCTYPE html>
<html>

<head>

    <title>SecureVault Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

<div class="card">

    <div class="logo">🔐</div>

    <h1>SecureVault</h1>

    <p class="subtitle">
        Secure File Encryption Platform
    </p>

    <form method="POST">

        <div class="input-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

        </div>

        <div class="input-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

        </div>

        <button>

            Login

        </button>

    </form>

    <div class="bottom">

        Don't have an account?

        <a href="{{ url_for('register') }}">

            Register

        </a>

    </div>

</div>

</body>

</html>
