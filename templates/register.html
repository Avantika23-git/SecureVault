<!DOCTYPE html>
<html>

<head>

    <title>Create Account</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

<div class="card">

    <div class="logo">🛡️</div>

    <h1>Create Account</h1>

    <p class="subtitle">

        Join SecureVault

    </p>

    <form method="POST">

        <div class="input-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                required>

        </div>

        <div class="input-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                required>

        </div>

        <button>

            Register

        </button>

    </form>

    <div class="bottom">

        Already have an account?

        <a href="{{ url_for('login') }}">

            Login

        </a>

    </div>

</div>

</body>

</html>
