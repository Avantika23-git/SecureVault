<!DOCTYPE html>
<html>
<head>
    <title>Activity Logs</title>
</head>
<body>

    <h1>Activity Logs</h1>

    <table border="1">
        <tr>
            <th>Filename</th>
            <th>Action</th>
            <th>Timestamp</th>
        </tr>

        {% for log in logs %}
        <tr>
            <td>{{ log.filename }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.timestamp }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="/">Back to Dashboard</a>

</body>
</html>
